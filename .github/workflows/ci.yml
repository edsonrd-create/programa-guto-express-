# Integração contínua: backend (npm test + check de módulos) e build do frontend.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Tests & syntax (CI)
        run: npm run test:ci

      - name: Smoke — API responde em /health
        if: matrix.node == '22'
        run: |
          set -e
          PORT=3999 NODE_ENV=development node src/server.js &
          GUTO_PID=$!
          cleanup() { kill $GUTO_PID 2>/dev/null || true; }
          trap cleanup EXIT
          sleep 6
          curl -fsS "http://127.0.0.1:3999/health" | grep -q '"ok":true'

      - name: Smoke — CORS em produção (whitelist)
        if: matrix.node == '22'
        run: |
          set -e
          PORT=4001 NODE_ENV=production ADMIN_API_KEY=ci-cors-smoke \
            CORS_ORIGINS=http://127.0.0.1:5173,https://painel.exemplo \
            node src/server.js &
          GUTO_PID=$!
          cleanup() { kill $GUTO_PID 2>/dev/null || true; }
          trap cleanup EXIT
          sleep 6
          H=$(curl -sI -H "Origin: http://127.0.0.1:5173" "http://127.0.0.1:4001/health")
          echo "$H" | grep -qi "access-control-allow-origin: http://127.0.0.1:5173"
          H2=$(curl -sI -H "Origin: https://evil.example" "http://127.0.0.1:4001/health")
          echo "$H2" | grep -qi "access-control-allow-origin: https://evil.example" && exit 1 || true

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: http://127.0.0.1:3210
