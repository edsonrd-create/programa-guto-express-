# Integração contínua: backend (npm test + check de módulos) e build do frontend.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['20', '22']
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Tests & syntax (CI)
        run: npm run test:ci

      - name: Smoke — API responde em /health
        if: matrix.node == '22'
        run: |
          set -e
          PORT=3999 NODE_ENV=development node src/server.js &
          GUTO_PID=$!
          cleanup() { kill $GUTO_PID 2>/dev/null || true; }
          trap cleanup EXIT
          sleep 6
          SMOKE_BASE_URL=http://127.0.0.1:3999 node scripts/smoke-http.mjs

      - name: Smoke — CORS em produção (whitelist)
        if: matrix.node == '22'
        run: |
          set -e
          PORT=4001 NODE_ENV=production ADMIN_API_KEY=ci-cors-smoke \
            CORS_ORIGINS=http://127.0.0.1:5173,https://pdvgutoexpress.com.br \
            node src/server.js &
          GUTO_PID=$!
          cleanup() { kill $GUTO_PID 2>/dev/null || true; }
          trap cleanup EXIT
          sleep 6
          SMOKE_BASE_URL=http://127.0.0.1:4001 SMOKE_ORIGIN=http://127.0.0.1:5173 \
            SMOKE_EXPECT_ACAO=http://127.0.0.1:5173 node scripts/smoke-http.mjs
          SMOKE_BASE_URL=http://127.0.0.1:4001 SMOKE_ORIGIN=https://evil.example \
            SMOKE_FORBID_ACAO=https://evil.example node scripts/smoke-http.mjs

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: http://127.0.0.1:3210
