# Exemplo (ajuste server_name, caminhos e portas).
# API Node à escuta em 127.0.0.1:3210 · ficheiros estáticos do Vite em /var/www/guto/dist
# Produção (painel): https://pdvgutoexpress.com.br — use HTTPS (Certbot) e redirecione HTTP→HTTPS.
#
# Coloque o site em sites-enabled e: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name pdvgutoexpress.com.br www.pdvgutoexpress.com.br;

    root /var/www/guto/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3210/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ops {
        proxy_pass http://127.0.0.1:3210/ws/ops;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}

